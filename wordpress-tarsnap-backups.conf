# WordPress Tarsnap Backups Configuration File
# Edit these settings according to your environment

# Site root directory where WordPress installations are located and other necessary paths
SITES_ROOT="/var/www"
TEMP_BACKUP_DIR="/tmp"
TARSNAP_KEY_FILE="/root/tarsnap.key"

# Directory for detailed script logs
LOG_DIR="/var/log/wordpress-tarsnap-backups"

# Retention Policy Configuration
RETENTION_SCHEME="simple"  # "simple", "gfs", or "manual"

# Simple Retention Settings
RETENTION_DAYS=31
MIN_BACKUPS_TO_KEEP=31

# GFS Retention Settings
GFS_HOURLY_KEEP=24
GFS_DAILY_KEEP=7
GFS_WEEKLY_KEEP=4
GFS_MONTHLY_KEEP=12
GFS_YEARLY_KEEP=3

# Email address for notifications (leave empty to disable notifications)
NOTIFY_EMAIL=""

# Performance Options
# Show progress indicators during long operations (yes/no)
# Disable for slightly faster operations in automated environments
SHOW_PROGRESS="yes"

# Print detailed archive statistics after backup (yes/no)
# Note: This makes an additional network call to Tarsnap servers
# Disable to reduce backup time by a few seconds per site
PRINT_STATS="yes"

# Site Selection Configuration
# List of site names (directory names) to EXCLUDE from backups
# Space-separated list of site names (e.g., "22222 html example.com")
EXCLUDED_SITES="22222 html"

# List of site names (directory names) to INCLUDE in backups
# When set, ONLY these sites will be backed up (overrides EXCLUDED_SITES)
# Leave empty to backup all sites except those in EXCLUDED_SITES
# Space-separated list of site names (e.g., "example.com site2.com")
INCLUDED_SITES=""

# Directory Exclusion Configuration
# List of directory patterns to exclude from file backups (applies to all sites)
# Space-separated list of patterns (e.g., "cache logs tmp uploads/cache")
# These are passed to tarsnap --exclude for fine-grained control
EXCLUDED_DIRECTORIES="cache logs tmp uploads/cache wp-content/cache wp-content/updraft wp-content/backup* wp-content/uploads/backup*"