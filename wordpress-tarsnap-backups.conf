# WordPress Tarsnap Backups Configuration File
# Edit these settings according to your environment

# Path Configuration
SITES_ROOT="/var/www"
TEMP_BACKUP_DIR="/tmp"
TARSNAP_KEY_FILE="/root/tarsnap.key"
LOG_DIR="/var/log/wordpress-tarsnap-backups"

# Retention Policy Configuration
RETENTION_SCHEME="simple"  # "simple", "gfs", or "manual"

# Simple Retention Settings
RETENTION_DAYS=31
MIN_BACKUPS_TO_KEEP=31

# GFS Retention Settings
GFS_HOURLY_KEEP=24
GFS_DAILY_KEEP=7
GFS_WEEKLY_KEEP=4
GFS_MONTHLY_KEEP=12
GFS_YEARLY_KEEP=3

# Email Notifications
NOTIFY_EMAIL=""

# Site Exclusions (space-separated list)
EXCLUDED_SITES="22222 html"